<svg viewBox="0 0 460 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="460" height="300" fill="#F8FAFC" rx="12"/>
  <!-- Header -->
  <rect width="460" height="44" fill="#1B2A4A" rx="12"/>
  <rect y="32" width="460" height="12" fill="#1B2A4A"/>
  <text x="18" y="28" font-size="12" font-weight="700" fill="white">P1 · Pricing Intelligence</text>
  <rect x="374" y="12" width="70" height="20" fill="#0D9488" rx="10"/>
  <text x="409" y="26" text-anchor="middle" font-size="10" font-weight="600" fill="white">FMCG</text>
  <!-- Floor line -->
  <line x1="44" y1="196" x2="416" y2="196" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="420" y="200" font-size="9" fill="#EF4444" font-weight="600">Floor</text>
  <!-- Bars: margin % -->
  <rect x="52" y="116" width="44" height="80" fill="#0D9488" rx="3"/>
  <text x="74" y="111" text-anchor="middle" font-size="10" font-weight="700" fill="#1B2A4A">42%</text>
  <rect x="112" y="132" width="44" height="64" fill="#0D9488" rx="3" opacity="0.85"/>
  <text x="134" y="127" text-anchor="middle" font-size="10" font-weight="700" fill="#1B2A4A">38%</text>
  <rect x="172" y="168" width="44" height="28" fill="#D4A843" rx="3"/>
  <text x="194" y="163" text-anchor="middle" font-size="10" font-weight="700" fill="#1B2A4A">32%</text>
  <!-- Breach bars (below floor, pointing down) -->
  <rect x="232" y="196" width="44" height="24" fill="#EF4444" rx="3" opacity="0.85"/>
  <text x="254" y="235" text-anchor="middle" font-size="8" fill="#EF4444" font-weight="600">BREACH</text>
  <rect x="292" y="196" width="44" height="36" fill="#EF4444" rx="3" opacity="0.7"/>
  <text x="314" y="248" text-anchor="middle" font-size="8" fill="#EF4444" font-weight="600">BREACH</text>
  <rect x="352" y="104" width="44" height="92" fill="#0D9488" rx="3" opacity="0.9"/>
  <text x="374" y="99" text-anchor="middle" font-size="10" font-weight="700" fill="#1B2A4A">46%</text>
  <!-- X labels -->
  <text x="74" y="256" text-anchor="middle" font-size="9" fill="#64748B">SKU A</text>
  <text x="134" y="256" text-anchor="middle" font-size="9" fill="#64748B">SKU B</text>
  <text x="194" y="256" text-anchor="middle" font-size="9" fill="#64748B">SKU C</text>
  <text x="254" y="256" text-anchor="middle" font-size="9" fill="#64748B">SKU D</text>
  <text x="314" y="256" text-anchor="middle" font-size="9" fill="#64748B">SKU E</text>
  <text x="374" y="256" text-anchor="middle" font-size="9" fill="#64748B">SKU F</text>
  <!-- Y axis tick -->
  <line x1="44" y1="196" x2="40" y2="196" stroke="#CBD5E1" stroke-width="1"/>
  <text x="36" y="200" text-anchor="end" font-size="9" fill="#94A3B8">32%</text>
  <!-- Callout row -->
  <rect x="18" y="268" width="196" height="20" fill="#DCFCE7" rx="4"/>
  <text x="26" y="282" font-size="9" fill="#065F46" font-weight="600">✓ 4 SKUs with repricing opportunity</text>
  <rect x="222" y="268" width="140" height="20" fill="#FEE2E2" rx="4"/>
  <text x="230" y="282" font-size="9" fill="#991B1B" font-weight="600">⚠ 2 margin floor breaches</text>
</svg>
