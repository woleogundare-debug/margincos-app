<svg viewBox="0 0 460 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="460" height="300" fill="#F8FAFC" rx="12"/>
  <!-- Header -->
  <rect width="460" height="44" fill="#1B2A4A" rx="12"/>
  <rect y="32" width="460" height="12" fill="#1B2A4A"/>
  <text x="18" y="28" font-size="12" font-weight="700" fill="white">P2 · Cost Pass-Through</text>
  <rect x="374" y="12" width="70" height="20" fill="#DC2626" rx="10"/>
  <text x="409" y="26" text-anchor="middle" font-size="10" font-weight="600" fill="white">FMCG</text>
  <!-- Benchmark line -->
  <line x1="44" y1="126" x2="416" y2="126" stroke="#0D9488" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="420" y="130" font-size="8" fill="#0D9488" font-weight="600">75%</text>
  <text x="420" y="140" font-size="7" fill="#0D9488">bench</text>
  <!-- Grouped bars per product: inflation (full) vs recovered (filled) -->
