  <rect x="370" y="90" width="12" height="12" fill="#E2E8F0" rx="2"/>
  <text x="386" y="101" font-size="9" fill="#64748B">Inflation</text>
  <rect x="370" y="108" width="12" height="12" fill="#0D9488" rx="2"/>
  <text x="386" y="119" font-size="9" fill="#64748B">Recovered</text>
  <!-- Absorbed annotation -->
  <line x1="100" y1="158" x2="100" y2="196" stroke="#DC2626" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="108" y="162" width="72" height="16" fill="#FEE2E2" rx="3"/>
  <text x="144" y="174" text-anchor="middle" font-size="8" fill="#991B1B" font-weight="600">₦12.4M absorbed</text>
  <!-- Callout row -->
  <rect x="18" y="268" width="230" height="20" fill="#FEF3C7" rx="4"/>
  <text x="26" y="282" font-size="9" fill="#92400E" font-weight="600">Portfolio recovery rate: 64% vs 75% benchmark</text>
  <rect x="256" y="268" width="186" height="20" fill="#FEE2E2" rx="4"/>
  <text x="264" y="282" font-size="9" fill="#991B1B" font-weight="600">Gap: ₦18.7M/month unrecovered</text>
