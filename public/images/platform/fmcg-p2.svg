  <text x="158" y="225" text-anchor="middle" font-size="8" fill="#DC2626" font-weight="700">50%</text>
  <!-- Product 4 -->
  <rect x="188" y="86" width="28" height="110" fill="#E2E8F0" rx="2"/>
  <rect x="188" y="86" width="28" height="94" fill="#0D9488" rx="2" opacity="0.9"/>
  <text x="202" y="214" text-anchor="middle" font-size="8" fill="#64748B">Prod D</text>
  <text x="202" y="225" text-anchor="middle" font-size="8" fill="#0D9488" font-weight="700">85%</text>
  <!-- Product 5 -->
  <rect x="232" y="86" width="28" height="110" fill="#E2E8F0" rx="2"/>
  <rect x="232" y="86" width="28" height="44" fill="#DC2626" rx="2" opacity="0.7"/>
  <text x="246" y="214" text-anchor="middle" font-size="8" fill="#64748B">Prod E</text>
  <text x="246" y="225" text-anchor="middle" font-size="8" fill="#DC2626" font-weight="700">40%</text>
  <!-- Product 6 -->
  <rect x="276" y="86" width="28" height="110" fill="#E2E8F0" rx="2"/>
  <rect x="276" y="86" width="28" height="66" fill="#D4A843" rx="2" opacity="0.9"/>
  <text x="290" y="214" text-anchor="middle" font-size="8" fill="#64748B">Prod F</text>
  <text x="290" y="225" text-anchor="middle" font-size="8" fill="#D4A843" font-weight="700">60%</text>
  <!-- Product 7 -->
  <rect x="320" y="86" width="28" height="110" fill="#E2E8F0" rx="2"/>
  <rect x="320" y="86" width="28" height="77" fill="#0D9488" rx="2" opacity="0.75"/>
  <text x="334" y="214" text-anchor="middle" font-size="8" fill="#64748B">Prod G</text>
  <text x="334" y="225" text-anchor="middle" font-size="8" fill="#0D9488" font-weight="700">70%</text>
