  <text x="70" y="225" text-anchor="middle" font-size="8" fill="#0D9488" font-weight="700">80%</text>
  <!-- Product 2 -->
  <rect x="100" y="86" width="28" height="110" fill="#E2E8F0" rx="2"/>
