<svg viewBox="0 0 460 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="460" height="300" fill="#F8FAFC" rx="12"/>
  <rect width="460" height="44" fill="#1B2A4A" rx="12"/>
  <rect y="32" width="460" height="12" fill="#1B2A4A"/>
  <text x="18" y="28" font-size="12" font-weight="700" fill="white">P2 · Fuel Surcharge Recovery</text>
  <rect x="360" y="12" width="84" height="20" fill="#DC2626" rx="10"/>
  <text x="402" y="26" text-anchor="middle" font-size="10" font-weight="600" fill="white">Logistics</text>
  <!-- Fuel cost vs recovery per contract type -->
  <text x="18" y="68" font-size="9" fill="#64748B">Monthly Fuel Cost vs Amount Recovered by Contract Type</text>
  <!-- Benchmark line -->
  <line x1="44" y1="124" x2="416" y2="124" stroke="#0D9488" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="420" y="128" font-size="8" fill="#0D9488" font-weight="600">70%</text>
  <text x="420" y="138" font-size="7" fill="#0D9488">bench</text>
  <!-- Grouped bars per contract type: fuel cost (full) vs recovered (partial) -->
  <!-- Contracted -->
  <rect x="50" y="84" width="30" height="116" fill="#E2E8F0" rx="2"/>
  <rect x="50" y="84" width="30" height="90" fill="#0D9488" rx="2"/>
  <text x="65" y="216" text-anchor="middle" font-size="8" fill="#64748B">CON</text>
  <text x="65" y="228" text-anchor="middle" font-size="8" fill="#0D9488" font-weight="700">78%</text>
  <!-- Spot -->
  <rect x="110" y="84" width="30" height="116" fill="#E2E8F0" rx="2"/>
  <rect x="110" y="84" width="30" height="58" fill="#DC2626" rx="2" opacity="0.8"/>
  <text x="125" y="216" text-anchor="middle" font-size="8" fill="#64748B">SPT</text>
  <text x="125" y="228" text-anchor="middle" font-size="8" fill="#DC2626" font-weight="700">50%</text>
  <!-- Dedicated -->
  <rect x="170" y="84" width="30" height="116" fill="#E2E8F0" rx="2"/>
  <rect x="170" y="84" width="30" height="98" fill="#0D9488" rx="2" opacity="0.85"/>
  <text x="185" y="216" text-anchor="middle" font-size="8" fill="#64748B">DED</text>
  <text x="185" y="228" text-anchor="middle" font-size="8" fill="#0D9488" font-weight="700">85%</text>
  <!-- Ad-hoc -->
  <rect x="230" y="84" width="30" height="116" fill="#E2E8F0" rx="2"/>
  <rect x="230" y="84" width="30" height="46" fill="#DC2626" rx="2" opacity="0.7"/>
  <text x="245" y="216" text-anchor="middle" font-size="8" fill="#64748B">ADH</text>
  <text x="245" y="228" text-anchor="middle" font-size="8" fill="#DC2626" font-weight="700">40%</text>
  <!-- Backhaul -->
  <rect x="290" y="84" width="30" height="116" fill="#E2E8F0" rx="2"/>
  <rect x="290" y="84" width="30" height="69" fill="#D4A843" rx="2" opacity="0.8"/>
  <text x="305" y="216" text-anchor="middle" font-size="8" fill="#64748B">BKH</text>
  <text x="305" y="228" text-anchor="middle" font-size="8" fill="#D4A843" font-weight="700">60%</text>
  <!-- Intermodal -->
  <rect x="350" y="84" width="30" height="116" fill="#E2E8F0" rx="2"/>
  <rect x="350" y="84" width="30" height="104" fill="#0D9488" rx="2" opacity="0.9"/>
  <text x="365" y="216" text-anchor="middle" font-size="8" fill="#64748B">IML</text>
  <text x="365" y="228" text-anchor="middle" font-size="8" fill="#0D9488" font-weight="700">90%</text>
  <!-- Gap annotation at Spot -->
  <line x1="125" y1="142" x2="125" y2="200" stroke="#DC2626" stroke-width="1.5"/>
  <rect x="130" y="160" width="56" height="26" fill="#FEE2E2" rx="3"/>
  <text x="158" y="172" text-anchor="middle" font-size="8" fill="#991B1B" font-weight="600">₦2.1M</text>
  <text x="158" y="182" text-anchor="middle" font-size="7" fill="#991B1B">absorbed</text>
  <!-- Legend -->
  <rect x="390" y="80" width="12" height="10" fill="#E2E8F0" rx="2"/>
  <text x="406" y="89" font-size="8" fill="#64748B">Fuel cost</text>
  <rect x="390" y="96" width="12" height="10" fill="#0D9488" rx="2"/>
  <text x="406" y="105" font-size="8" fill="#64748B">Recovered</text>
  <!-- Callout -->
  <rect x="18" y="248" width="230" height="20" fill="#FEF3C7" rx="4"/>
  <text x="26" y="262" font-size="9" fill="#92400E" font-weight="600">Portfolio recovery rate: 67% vs 70% benchmark</text>
  <rect x="256" y="248" width="186" height="20" fill="#FEE2E2" rx="4"/>
  <text x="264" y="262" font-size="9" fill="#991B1B" font-weight="600">₦6.2M/month absorbed fleet-wide</text>
  <rect x="18" y="272" width="300" height="20" fill="#EFF6FF" rx="4"/>
  <text x="26" y="286" font-size="9" fill="#1D4ED8" font-weight="600">Spot &amp; Ad-hoc: trigger surcharge clause at renewal</text>
</svg>
