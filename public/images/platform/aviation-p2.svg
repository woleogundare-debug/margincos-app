<svg viewBox="0 0 460 300" xmlns="http://www.w3.org/2000/svg" font-family="DM Sans, sans-serif">
  <rect width="460" height="300" fill="#F8FAFC" rx="12"/>
  <rect width="460" height="44" fill="#1B2A4A" rx="12"/>
  <rect y="32" width="460" height="12" fill="#1B2A4A"/>
  <text x="18" y="28" font-size="12" font-weight="700" fill="white">P2 · Fuel Cost Pass-Through</text>
  <rect x="340" y="12" width="104" height="20" fill="#0D8F8F" rx="10"/>
  <text x="392" y="26" text-anchor="middle" font-size="10" font-weight="600" fill="white">Aviation</text>
  <text x="18" y="68" font-size="9" fill="#64748B">Cost Waterfall — Fully-Loaded Cost per Seat per Month</text>
  <!-- Jet fuel -->
  <text x="18" y="96" font-size="9" fill="#64748B">Jet fuel cost</text>
  <rect x="155" y="83" width="152" height="18" fill="#C0392B" rx="2" opacity="0.75"/>
  <text x="311" y="96" font-size="9" fill="#C0392B" font-weight="700">₦38.0k  ↑58%</text>
  <!-- Crew -->
  <text x="18" y="122" font-size="9" fill="#64748B">+ Crew &amp; operations</text>
  <rect x="155" y="109" width="80" height="18" fill="#1B2A4A" rx="2" opacity="0.6"/>
  <text x="239" y="122" font-size="9" fill="#1B2A4A" font-weight="700">+₦20k</text>
  <!-- Maintenance -->
  <text x="18" y="148" font-size="9" fill="#64748B">+ Maintenance &amp; MRO</text>
  <rect x="155" y="135" width="60" height="18" fill="#D4A843" rx="2" opacity="0.75"/>
  <text x="219" y="148" font-size="9" fill="#D4A843" font-weight="700">+₦15k</text>
  <!-- Airport fees -->
  <text x="18" y="174" font-size="9" fill="#64748B">+ Airport &amp; nav fees</text>
  <rect x="155" y="161" width="44" height="18" fill="#D4A843" rx="2" opacity="0.6"/>
  <text x="203" y="174" font-size="9" fill="#D4A843" font-weight="700">+₦11k</text>
  <!-- Total cost -->
  <line x1="155" y1="188" x2="420" y2="188" stroke="#CBD5E1" stroke-width="0.75" stroke-dasharray="3,2"/>
  <text x="18" y="204" font-size="9" fill="#64748B">Total cost/seat/mo</text>
  <rect x="155" y="191" width="280" height="18" fill="#1B2A4A" rx="2" opacity="0.85"/>
  <text x="440" y="204" text-anchor="end" font-size="9" fill="white" font-weight="700">₦84k</text>
  <!-- Benchmark line -->
  <line x1="155" y1="218" x2="248" y2="218" stroke="#0D8F8F" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="253" y="222" font-size="8" fill="#0D8F8F">Benchmark recovery 73%</text>
  <!-- Current yield -->
  <text x="18" y="236" font-size="9" fill="#64748B">Avg. yield/seat/mo</text>
  <rect x="155" y="223" width="246" height="18" fill="#0D8F8F" rx="2" opacity="0.7"/>
  <text x="405" y="236" font-size="9" fill="#0D8F8F" font-weight="700">₦61.5k (73%)</text>
  <line x1="18" y1="252" x2="442" y2="252" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="18" y="264" width="212" height="20" fill="#FEE2E2" rx="4"/>
  <text x="26" y="278" font-size="9" fill="#991B1B" font-weight="600">Fuel: 45% of total cost — up from 31% in 2022</text>
  <rect x="238" y="264" width="204" height="20" fill="#EFF6FF" rx="4"/>
  <text x="246" y="278" font-size="9" fill="#1D4ED8" font-weight="600">Fuel surcharge not calibrated to route-level gap</text>
</svg>
