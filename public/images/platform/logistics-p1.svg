  <rect x="18" y="138" width="424" height="22" fill="white"/>
  <text x="26" y="153" font-size="9" fill="#1B2A4A">PH–Lagos</text>
  <text x="146" y="153" font-size="9" fill="#1B2A4A">₦245</text>
