  <text x="374" y="88" font-size="9" font-weight="700" fill="#1B2A4A">Status</text>
  <!-- Row 1 - healthy -->
  <rect x="18" y="94" width="424" height="22" fill="white"/>
  <text x="26" y="109" font-size="9" fill="#1B2A4A">Lagos–Kano</text>
