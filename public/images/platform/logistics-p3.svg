  <text x="255" y="186" font-size="8" fill="#EF4444">← high deadhead cost</text>
  <text x="18" y="210" font-size="9" fill="#1B2A4A" font-weight="600">SARO Agro</text>
  <rect x="160" y="198" width="18" height="16" fill="#EF4444" rx="2" opacity="0.5"/>
