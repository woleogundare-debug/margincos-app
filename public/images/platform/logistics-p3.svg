  <text x="242" y="210" font-size="8" fill="#EF4444">← 90-day payment terms</text>
  <!-- Divider -->
  <line x1="18" y1="222" x2="442" y2="222" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Summary -->
  <text x="18" y="240" font-size="9" fill="#64748B">Top 2 customers</text>
