  <!-- Managed Services -->
  <text x="18" y="92" font-size="10" fill="#1B2A4A" font-weight="600">Managed Services</text>
  <rect x="168" y="80" width="180" height="14" fill="#0D8F8F" rx="2" opacity="0.85"/>
  <rect x="168" y="94" width="128" height="14" fill="#1B2A4A" rx="2" opacity="0.3"/>
  <text x="352" y="91" font-size="9" fill="#0D8F8F" font-weight="700">₦45k/hr</text>
  <text x="300" y="108" font-size="9" fill="#64748B">floor ₦32k</text>
  <!-- Cloud Implementation -->
  <text x="18" y="128" font-size="10" fill="#1B2A4A" font-weight="600">Cloud Impl.</text>
  <rect x="168" y="116" width="148" height="14" fill="#0D8F8F" rx="2" opacity="0.7"/>
  <rect x="168" y="130" width="140" height="14" fill="#1B2A4A" rx="2" opacity="0.3"/>
